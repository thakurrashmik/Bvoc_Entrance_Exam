{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="card shadow-lg border-0">
            <div class="card-body p-4 p-md-5">
                <h1 class="h3 mb-2">Create account</h1>
                <p class="text-muted mb-4">Register as a student or admin.</p>
                <form method="post">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" name="name" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Role</label>
                            <select class="form-select" name="role">
                                <option value="student">Student</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" name="password" required>
                        </div>
                    </div>
                    <button class="btn btn-dark w-100 mt-4" type="submit">Register</button>
                </form>
                <div class="mt-3 small">Already have an account? <a href="{{ url_for('login') }}">Login</a>.</div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
