{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="card shadow-lg border-0">
            <div class="card-body p-4 p-md-5">
                <h1 class="h3 mb-2">Welcome back</h1>
                <p class="text-muted mb-4">Sign in to continue to the exam portal.</p>
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    <button class="btn btn-dark w-100" type="submit">Login</button>
                </form>
                <div class="mt-3 small text-muted">
                    Admin demo: admin@example.com / admin123<br>
                    Student demo: student@example.com / student123
                </div>
                <hr>
                <div class="small">No account yet? <a href="{{ url_for('register') }}">Create one</a>.</div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
